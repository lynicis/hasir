name: Security Scans

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Run Gosec
        uses: securego/gosec@v2.28.0
        with:
          args: ./apps/api/...

      - name: Run Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          work-dir: apps/api

      - name: Bun Audit
        run: bun audit

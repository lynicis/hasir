name: Docker Build & Push

on:
  push:
    tags:
      - 'hasir-api@*.*.*'
      - 'hasir-dashboard@*.*.*'

permissions:
  packages: write
  contents: read

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Determine Target
        id: target
        run: |
          if [[ "${{ github.ref_name }}" == hasir-api@* ]]; then
            echo "name=api" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF_NAME#hasir-api@}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == hasir-dashboard@* ]]; then
            echo "name=dashboard" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF_NAME#hasir-dashboard@}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        if: steps.target.outputs.name != ''
        env:
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          docker buildx bake \
            -f docker/shared/docker-bake.hcl \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            --push ${{ steps.target.outputs.name }}

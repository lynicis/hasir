name: Docker Build & Push

on:
  push:
    tags:
      - 'api/v*.*.*'
      - 'dashboard/v*.*.*'

permissions:
  packages: write
  contents: read

jobs:
  bake:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Target
        id: target
        run: |
          if [[ "${{ github.ref_name }}" == api/* ]]; then
            echo "name=api" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF_NAME#api/}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == dashboard/* ]]; then
            echo "name=dashboard" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF_NAME#dashboard/}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        if: steps.target.outputs.name != ''
        env:
          TAG: ${{ steps.target.outputs.tag }}
        run: docker buildx bake -f docker/shared/docker-bake.hcl --push ${{ steps.target.outputs.name }}

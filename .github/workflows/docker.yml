name: Docker Build & Push

on:
  push:
    tags:
      - 'hasir-api@*.*.*'
      - 'hasir-dashboard@*.*.*'

permissions:
  packages: write
  contents: read

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Determine Target
        id: target
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" == hasir-api@* ]]; then
            echo "name=api" >> "$GITHUB_OUTPUT"
            echo "tag=${REF_NAME#hasir-api@}" >> "$GITHUB_OUTPUT"
          elif [[ "$REF_NAME" == hasir-dashboard@* ]]; then
            echo "name=dashboard" >> "$GITHUB_OUTPUT"
            echo "tag=${REF_NAME#hasir-dashboard@}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.target.outputs.name != ''
        env:
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          docker buildx bake \
            -f docker/shared/docker-bake.hcl \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            --push ${{ steps.target.outputs.name }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  TURBO_TEAM: lynicis-projects

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache Turborepo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.ref_name }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            turbo-${{ runner.os }}-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Cache Go tools
        uses: actions/cache@v6
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          token: ${{ secrets.BUF_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Affected)
        run: bun run affected:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache Turborepo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.ref_name }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            turbo-${{ runner.os }}-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Cache Go tools
        uses: actions/cache@v6
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Install protoc-gen-doc
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@latest

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          token: ${{ secrets.BUF_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test (Affected)
        run: bun run affected:test

      - name: Generate Go coverage
        run: cd apps/api && go test -count=1 -coverprofile=coverage.out -covermode=atomic ./...
        continue-on-error: true

      - name: Generate Dashboard coverage
        run: cd apps/dashboard && bun run test:ci
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/api/coverage.out,apps/dashboard/coverage/lcov.info
          flags: api,dashboard
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache Turborepo
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ github.ref_name }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            turbo-${{ runner.os }}-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: "**/go.sum"

      - name: Setup Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          token: ${{ secrets.BUF_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (Affected)
        run: bun run affected:build

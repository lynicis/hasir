version: v2
modules:
  - path: .
    name: buf.build/hasir/hasir
deps:
  - buf.build/protocolbuffers/wellknowntypes
  - buf.build/bufbuild/protovalidate
lint:
  use:
    - BASIC
breaking:
  use:
    - FILE

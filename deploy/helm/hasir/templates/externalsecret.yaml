# path: deploy/helm/hasir/templates/externalsecret.yaml
# See ADR-0007: External Secrets Operator replaces plaintext secrets.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: '{{ include "hasir.fullname" . }}-secrets'
  labels:
    {{- include "hasir.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: hasir-secret-store
    kind: ClusterSecretStore
  target:
    name: '{{ include "hasir.fullname" . }}-secrets'
    creationPolicy: Owner
  data:
    - secretKey: HASIR_POSTGRESQL_PASSWORD
      remoteRef:
        key: hasir/prod/db
        property: password
    - secretKey: HASIR_JWTSECRET
      remoteRef:
        key: hasir/prod/api
        property: jwtSecret
    - secretKey: HASIR_SMTP_USERNAME
      remoteRef:
        key: hasir/prod/smtp
        property: username
    - secretKey: HASIR_SMTP_PASSWORD
      remoteRef:
        key: hasir/prod/smtp
        property: password
